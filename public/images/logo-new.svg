<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b9d;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <text x="50%" y="45%" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="100" font-weight="900" fill="url(#grad1)" filter="url(#glow)" letter-spacing="5">STREAMERS</text>
  <text x="50%" y="80%" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="100" font-weight="900" fill="url(#grad1)" filter="url(#glow)" letter-spacing="5">UNIVERSE</text>
</svg>